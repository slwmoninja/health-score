const GH_SCOPES = 'openid email '
  + 'https://www.googleapis.com/auth/googlehealth.activity_and_fitness.readonly '
  + 'https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly';

function ghRedirectUri(){ return location.origin + location.pathname; }

// Decodes the email out of Google's id_token (a JWT) so the app can show which
// Google account actually got connected — the account tied to someone's Fitbit
// is frequently not their everyday/default one, so surfacing it lets a mismatch
// get caught immediately instead of silently syncing the wrong person's data.
function decodeJwtEmail(idToken){
  try{
    const payload = idToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(payload).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json).email || null;
  }catch(e){ return null; }
}

async function startGoogleHealthAuth(){
  const {clientId} = state.settings;
  if(!clientId){ alert('Add your Google Client ID first (see Step 2 below the button).'); return; }
  const params = new URLSearchParams({
    client_id: clientId, response_type:'code', redirect_uri: ghRedirectUri(),
    // select_account forces Google's account-chooser screen every single time,
    // even if the browser already has an active Google session — without it,
    // "Reconnect" can silently reuse whatever account is currently signed in
    // instead of letting the person pick the one their Fitbit actually uses.
    scope: GH_SCOPES, access_type:'offline', prompt:'consent select_account', include_granted_scopes:'true'
  });
  // Regular navigation (not location.replace) — replace() turned out to destroy the
  // app's own history entry too (since Google's return redirect collapses into the
  // same slot), so back skipped past the app entirely instead of landing on it. A
  // normal push means back may briefly land on Google's consent page once, which is
  // a smaller problem than back exiting the app altogether.
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}
async function handleGoogleHealthRedirect(){
  const url = new URL(location.href);
  const code = url.searchParams.get('code');
  if(!code) return;
  history.replaceState({tab:'today', focus:null}, '', ghRedirectUri()); // strip ?code=, keep the tab-history convention consistent
  const {clientId, clientSecret} = state.settings;
  if(!clientId || !clientSecret) return;
  try{
    const body = new URLSearchParams({
      client_id: clientId, client_secret: clientSecret, grant_type:'authorization_code',
      code, redirect_uri: ghRedirectUri()
    });
    const res = await fetch('https://oauth2.googleapis.com/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
    });
    if(!res.ok){
      const bodyText = await res.text().catch(()=>'');
      throw new Error(`Token exchange HTTP ${res.status}: ${bodyText.slice(0,300)}`);
    }
    const data = await res.json();
    const email = data.id_token ? decodeJwtEmail(data.id_token) : null;
    state.googleHealth = {accessToken:data.access_token, refreshToken:data.refresh_token, expiresAt: Date.now()+data.expires_in*1000, email};
    saveState();
    await fetchGoogleHealthToday(false);
  }catch(e){
    logError('Connect failed: '+e.message);
    alert('Google Health connection failed:\n\n'+e.message+'\n\nMost common causes: the app owner hasn\'t approved your email as a test user yet, or the Client ID/Secret was mistyped when you pasted it in Step 2. Check with the app owner if it keeps failing.');
  }
}
async function ensureGoogleHealthToken(){
  const gh = state.googleHealth;
  if(gh.accessToken && Date.now() < gh.expiresAt-60000) return gh.accessToken;
  if(!gh.refreshToken) return null;
  const body = new URLSearchParams({
    client_id: state.settings.clientId, client_secret: state.settings.clientSecret,
    grant_type:'refresh_token', refresh_token: gh.refreshToken
  });
  const res = await fetch('https://oauth2.googleapis.com/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  });
  if(!res.ok) return null;
  const data = await res.json();
  gh.accessToken = data.access_token; gh.expiresAt = Date.now()+data.expires_in*1000;
  if(data.refresh_token) gh.refreshToken = data.refresh_token; // Google doesn't always reissue one
  saveState();
  return gh.accessToken;
}
function extractNumericField(obj, candidates){
  if(!obj) return null;
  for(const key of candidates){
    if(obj[key]!==undefined && obj[key]!==null){ const n=Number(obj[key]); if(!isNaN(n)) return n; }
  }
  return null;
}
// Finds whichever nested field ends in "Sum" (e.g. steps -> countSum, confirmed
// against Google's own reference CLI source) rather than a single hardcoded
// name per data type — resilient to the exact key not being re-checked for
// every type. Values come back as strings ("9037"), hence the Number() call.
function extractRollupSum(rollupPoint){
  if(!rollupPoint) return null;
  for(const key of Object.keys(rollupPoint)){
    if(key==='civilStartTime'||key==='civilEndTime') continue;
    const obj = rollupPoint[key];
    if(obj && typeof obj==='object'){
      const sumKey = Object.keys(obj).find(k=>k.toLowerCase().endsWith('sum'));
      if(sumKey) return Number(obj[sumKey]);
    }
  }
  return null;
}
// The API's CivilDateTime wraps year/month/day in a "date" key — omitting that
// wrapper (sending {year,month,day} directly as the range bound) is what was
// causing the 400 INVALID_DATA_POINT_FILTER_RESTRICTION_COMPARATOR error.
function civilDate(dateIso){
  const d = dateFromIso(dateIso);
  return {date: {year:d.getFullYear(), month:d.getMonth()+1, day:d.getDate()}};
}
// One aggregated total for the whole day, computed server-side — avoids both
// the civil_start_time filter's comparator restrictions and any risk of
// under-counting from un-paginated raw data points.
async function fetchGoogleHealthRollup(dataType, dateIso, token){
  const url = `https://health.googleapis.com/v4/users/me/dataTypes/${dataType}/dataPoints:dailyRollUp`;
  const body = JSON.stringify({
    range: {start: civilDate(dateIso), end: civilDate(addDays(dateIso,1))},
    windowSizeDays: 1
  });
  const res = await fetch(url, {method:'POST', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body});
  if(!res.ok){
    const bodyText = await res.text().catch(()=>'');
    throw new Error(`HTTP ${res.status} for ${dataType}: ${bodyText.slice(0,300)}`);
  }
  const data = await res.json();
  const points = data.rollupDataPoints || [];
  return points.reduce((sum,p)=>sum + (extractRollupSum(p)||0), 0);
}
async function fetchGoogleHealthDataType(dataType, filterField, dateIso, token){
  // civil_start_time only supports >= and < as comparators (no <=), so the upper
  // bound has to be the start of the next day, not 23:59:59 of this one.
  const start = `${dateIso}T00:00:00`, end = `${addDays(dateIso,1)}T00:00:00`;
  const filter = `${filterField}.interval.civil_start_time >= "${start}" AND ${filterField}.interval.civil_start_time < "${end}"`;
  const url = `https://health.googleapis.com/v4/users/me/dataTypes/${dataType}/dataPoints?filter=${encodeURIComponent(filter)}`;
  const res = await fetch(url, {headers:{'Authorization':'Bearer '+token}});
  if(!res.ok){
    const bodyText = await res.text().catch(()=>'');
    throw new Error(`HTTP ${res.status} for ${dataType}: ${bodyText.slice(0,300)}`);
  }
  const data = await res.json();
  return data.dataPoints || data.dataPoint || [];
}
async function fetchGoogleHealthToday(silent){
  const token = await ensureGoogleHealthToken();
  if(!token){ if(!silent) alert('Not connected to Google Health yet — tap "Connect & sync today" first.'); return; }
  const t = today();
  try{
    const [steps, activeMin, kcal, distanceMm] = await Promise.all([
      fetchGoogleHealthRollup('steps', t, token),
      fetchGoogleHealthRollup('active-zone-minutes', t, token).catch(()=>0),
      fetchGoogleHealthRollup('active-energy-burned', t, token).catch(()=>0),
      fetchGoogleHealthRollup('distance', t, token).catch(()=>0) // returned in millimeters, per Google's field docs
    ]);
    const d = getDay(t);
    d.activity = {
      steps: Math.round(steps), activeMin: Math.round(activeMin), kcal: Math.round(kcal),
      distanceMi: Math.round((distanceMm/1609340)*10)/10, source:'googlehealth'
    };

    try{
      const weightPoints = await fetchGoogleHealthDataType('weight', 'weight', t, token);
      if(weightPoints.length && !d.weightLb){
        const last = weightPoints[weightPoints.length-1];
        // Google's field is weightGrams — grams, not kilograms.
        const grams = extractNumericField(last.weight||last, ['weightGrams','massGrams','grams','value']);
        if(grams) d.weightLb = Math.round((grams/453.592)*10)/10;
      }
    }catch(e){ /* weight scope/data may not be available yet — activity sync still succeeds */ }

    state.googleHealth.lastSyncAt = Date.now();
    saveState();
    // Skip the re-render if the user is actively typing (e.g. the food search box) —
    // this silent background sync was replacing that input's DOM node mid-keystroke,
    // which read as the field "timing out"/losing what was just typed. State is still
    // saved either way; the UI catches up on the next natural render.
    if(!isUserTyping()) render();
    checkGoalsAndCelebrate(t);
    // No success alert — the infographics/drill-downs just refresh in place via render().
  }catch(e){
    console.error('Google Health sync failed:', e);
    logError('Sync failed: '+e.message);
    if(!silent) alert('Could not fetch Google Health data:\n\n'+e.message+'\n\nManual entry on the Log tab still works.');
  }
}
function isUserTyping(){
  const el = document.activeElement;
  return !!(el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA'));
}
let lastGHAutoSync = 0;
// Deliberately short — this is called from render(), which fires after essentially every
// app action (tab switch, food add/remove, activity edit, keystroke in search), so the app
// feels continuously live rather than needing a manual "refresh" tap. The floor only exists
// to stop rapid-fire renders (e.g. fast typing) from hammering the API.
const GH_AUTOSYNC_GAP_MS = 8*1000;
async function autoSyncGoogleHealthIfDue(){
  if(!state.googleHealth.refreshToken) return;
  if(Date.now()-lastGHAutoSync < GH_AUTOSYNC_GAP_MS) return;
  lastGHAutoSync = Date.now();
  await fetchGoogleHealthToday(true);
}
// Label for the "Fitbit sync" readout in the Today card's top-right corner — Fitbit's
// own data lives on Google Health now (see the block above), so this reads the same
// connection/timestamp state the auto-sync uses.
function fitbitSyncLabel(){
  const gh = state.googleHealth;
  if(!gh.refreshToken) return 'Fitbit not connected';
  if(!gh.lastSyncAt) return 'Fitbit sync pending…';
  const d = new Date(gh.lastSyncAt);
  const time = d.toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
  const sameDay = d.toDateString()===new Date().toDateString();
  return `Fitbit sync ${sameDay ? time : d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+', '+time}`;
}

function mountCharts(){
  // Steps/Active-min/Distance/Calories/Protein no longer render as charts anywhere —
  // openActivityModal/openNutritionModal show large readable numbers instead.
  // This only needs to handle History's trend chart.
  const t = today();
  const trendEl = document.getElementById('chart-trend');
  if(trendEl){
    let dates, labels;
    if(historyMode==='month'){
      dates = datesBetween(monthRange(t).start, t); // month-to-date, not into un-lived future days
      // ~31 points is too dense for a day-of-week label per point, so only label
      // the 1st, every 5th day, and today.
      labels = dates.map(d=>{
        const day = dateFromIso(d).getDate();
        return (day===1 || day%5===0 || d===t) ? String(day) : '';
      });
    }else{
      dates = []; for(let i=6;i>=0;i--) dates.push(addDays(t,-i));
      labels = dates.map(d=>dateFromIso(d).toLocaleDateString(undefined,{weekday:'short'}).slice(0,2));
    }
    if(historyMode==='month'){
      // Total Score and Weight are unrelated units (0-100 vs lb), so this chart
      // needs independent per-series scaling — see trendLineChart's opts.
      trendEl.appendChild(trendLineChart([
        {name:'Total Score', color:'var(--blue)', points: dates.map(dayOverallScore)},
        {name:'Weight', color:'var(--orange)', points: dates.map(d=>getDay(d).weightLb)}
      ], labels, {independentScale:true}));
    }else{
      trendEl.appendChild(trendLineChart([
        {name:'Activity', color:'var(--blue)', points: dates.map(activityScore)},
        {name:'Nutrition', color:'var(--aqua)', points: dates.map(nutritionScore)}
      ], labels));
    }
  }
}

  const importBtn = document.getElementById('s-import');
  const importFile = document.getElementById('s-import-file');
  if(importBtn && importFile) importBtn.addEventListener('click', ()=>importFile.click());
  if(importFile) importFile.addEventListener('change', ()=>importDataFromFile(importFile.files[0]));
  const clearErrorsBtn = document.getElementById('s-clear-errors');
  if(clearErrorsBtn) clearErrorsBtn.addEventListener('click', e=>{
    e.preventDefault(); // stays inside a <summary> — don't also toggle the fold
    state.errorLog = []; saveState(); render();
  });
  const resetBtn = document.getElementById('s-reset');
  if(resetBtn) resetBtn.addEventListener('click', ()=>{
    if(confirm('This will erase all Health Score data on this device. Continue?')){
      localStorage.removeItem(STORE_KEY); state = defaultState(); render();
    }
  });
  // Settings cards fold by default; a card that's been manually opened stays
  // open across the re-renders every save/toggle action triggers, since
  // render() otherwise wipes and rebuilds this whole screen from scratch.
  document.querySelectorAll('#app details.card[data-card-key]').forEach(d=>{
    d.addEventListener('toggle', ()=>{
      const key = d.dataset.cardKey;
      if(d.open) openSettingsCards.add(key); else openSettingsCards.delete(key);
    });
  });
}

history.replaceState({tab:'today', focus:null}, ''); // baseline entry so later tab switches have something to push atop
render();
handleGoogleHealthRedirect();
// Confetti plays here, on the next fresh page load after a goal was hit — not at
// the moment it's crossed mid-interaction (see checkGoalsAndCelebrate) — so it
// reads as a "welcome back, you did it" moment rather than popping up over
// whatever else was on screen right as the last food/activity got logged.
if(state.pendingCelebration){
  state.pendingCelebration = false;
  saveState();
  fireConfetti();
}
// This is a plain static page with no service worker, so a phone that already has it
// open (installed as a home-screen "web clip" or just left in a background tab) will
// otherwise keep running whatever version it loaded — potentially for days — since
// simply switching back to an already-open tab/webview doesn't re-fetch anything on
// its own. A no-store HEAD request bypasses both the browser's HTTP cache and GitHub
// Pages' CDN cache (Cache-Control: max-age=600) to always see the truly-latest
// deploy, so a push shows up next time the app is reopened, without anyone needing
// to know to manually refresh. Skips the reload while a field is focused so an
// update never clobbers whatever's mid-typing; localStorage data itself is
// untouched by a reload either way, since every change is already saved as it
// happens (see saveState() calls throughout).
let deployedVersionTag = null;
async function checkForUpdate(){
  try{
    const res = await fetch(location.pathname+'?_='+Date.now(), {cache:'no-store', method:'HEAD'});
    const tag = res.headers.get('etag') || res.headers.get('last-modified');
    if(!tag) return;
    if(deployedVersionTag===null){ deployedVersionTag = tag; return; } // first check just records the baseline
    if(tag===deployedVersionTag) return;
    if(isUserTyping()) return; // try again next check instead of interrupting active input
    location.reload();
  }catch(e){ /* offline or blocked — silently skip, next successful check catches up */ }
}
checkForUpdate();
// "visibilitychange" (not beforeunload) is the reliable close/backgrounding signal on
// mobile, where a PWA is far more often backgrounded/swiped away than formally
// "unloaded" — this covers the "sync on close" half of open+close syncing, alongside
// the sync render() already fires on open and on every subsequent app action.
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden'){ autoSyncGoogleHealthIfDue(); runAutoBackupDownload(); }
  if(document.visibilityState==='visible') checkForUpdate();
});
// Best-effort: asks the browser not to auto-evict this site's storage under
// low-disk pressure. Does NOT protect against the user explicitly clearing
// history/site data — no web API can opt out of that.
if(navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(()=>{});
</script>
