<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2a78d6">
<title>Health Score</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232a78d6'/%3E%3Cpath d='M20 55 L38 55 L45 40 L55 68 L62 50 L80 50' stroke='white' stroke-width='7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
:root{
  --surface:#fcfcfb;--page:#f9f9f7;--text:#0b0b0b;--text2:#52514e;--muted:#898781;
  --grid:#e1e0d9;--axis:#c3c2b7;--border:rgba(11,11,11,.10);
  --blue:#2a78d6;--aqua:#1baf7a;--yellow:#eda100;--green:#008300;--violet:#4a3aa7;--red:#e34948;--magenta:#e87ba4;--orange:#eb6834;
  --good:#0ca30c;--warning:#fab219;--serious:#ec835a;--critical:#d03b3b;
  --radius:14px;--shadow:0 2px 10px rgba(0,0,0,.08);
  --btn-hi:rgba(255,255,255,.35);--btn-lo:rgba(11,11,11,.22);
}
@media (prefers-color-scheme: dark){
  :root{
    --surface:#1a1a19;--page:#0d0d0d;--text:#ffffff;--text2:#c3c2b7;--muted:#898781;
    --grid:#2c2c2a;--axis:#383835;--border:rgba(255,255,255,.10);
    --blue:#3987e5;--aqua:#199e70;--yellow:#c98500;--green:#008300;--violet:#9085e9;--red:#e66767;--magenta:#d55181;--orange:#d95926;
    --btn-hi:rgba(255,255,255,.12);--btn-lo:rgba(0,0,0,.5);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--page);color:var(--text);
  max-width:480px;margin:0 auto;position:relative;padding-bottom:76px;}
h1,h2,h3{font-weight:700;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
.hidden{display:none !important;}

/* ---- top bar ---- */
.topbar{position:sticky;top:0;z-index:20;background:var(--page);display:flex;align-items:center;
  justify-content:space-between;padding:14px 16px 10px;}
.topbar h1{font-size:19px;}
.iconbtn{width:36px;height:36px;border-radius:10px;border:none;background:var(--surface);
  display:flex;align-items:center;justify-content:center;color:var(--text2);
  box-shadow:0 2px 0 var(--btn-lo), inset 0 1px 0 var(--btn-hi), var(--shadow);
  transition:transform .08s, box-shadow .08s;}
.iconbtn:active{transform:translateY(1px);box-shadow:0 0 0 var(--btn-lo), inset 0 1px 0 var(--btn-hi);}
.iconbtn svg{width:18px;height:18px;}

/* ---- screens ---- */
.screen{padding:4px 16px 12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card h3{font-size:14px;color:var(--text2);text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px;}
.card-head h3{margin-bottom:0;}
.card + .card{margin-top:0;}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.muted{color:var(--muted);font-size:12.5px;}
.text2{color:var(--text2);}

/* ---- info (tap-to-explain) ---- */
.info-btn{width:22px;height:22px;border-radius:50%;border:none;flex:none;
  background:var(--page);color:var(--muted);font-size:12px;font-weight:800;font-style:italic;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 0 var(--btn-lo), inset 0 1px 0 var(--btn-hi);}
.info-btn:active{transform:translateY(1px);box-shadow:none;}

/* ---- overall score ring ---- */
.score-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:22px 16px;}
.ring-wrap{position:relative;width:158px;height:158px;margin-bottom:8px;}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-label .num{font-size:38px;font-weight:800;line-height:1;}
.ring-label .lbl{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.04em;text-transform:uppercase;}

/* ---- bars ---- */
.chart{width:100%;}
.chart svg{width:100%;height:auto;display:block;overflow:visible;}
.bar-label{font-size:11px;fill:var(--text2);}
.bar-value{font-size:12px;font-weight:700;fill:var(--text);}
.axis-line{stroke:var(--axis);stroke-width:1;}
.goal-line{stroke:var(--muted);stroke-width:1.5;stroke-dasharray:3 3;}
.legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.swatch{width:10px;height:10px;border-radius:3px;flex:none;}

/* ---- badges / feedback ---- */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:4px 9px;border-radius:99px;}
.badge.good{color:var(--good);background:rgba(12,163,12,.10);}
.badge.focus{color:var(--serious);background:rgba(236,131,90,.14);}
.feedback-item{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--grid);}
.feedback-item:first-child{border-top:none;}
.feedback-item .dot{width:8px;height:8px;border-radius:50%;flex:none;margin-top:5px;}

/* ---- lists / logs ---- */
.food-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--grid);}
.food-row:first-child{border-top:none;}
.food-row .name{font-size:14px;font-weight:600;}
.food-row .sub{font-size:12px;color:var(--muted);}
.food-row .kcal{font-size:14px;font-weight:700;text-align:right;}
.food-row .del{background:none;border:none;color:var(--muted);font-size:18px;padding:4px 8px;}

/* ---- forms ---- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--text2);margin-bottom:6px;font-weight:600;}
.field input[type=text],.field input[type=number],.field select{
  width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--page);color:var(--text);font-size:15px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.seg{display:flex;background:var(--page);border-radius:10px;padding:3px;border:1px solid var(--border);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.1);}
.seg button{flex:1;border:none;background:none;padding:9px 6px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);
  transition:transform .08s;}
.seg button.active{background:linear-gradient(180deg, color-mix(in srgb, var(--blue) 100%, white 12%), var(--blue));
  color:#fff;box-shadow:0 2px 0 var(--btn-lo), inset 0 1px 0 rgba(255,255,255,.4);}
.seg button.active:active{transform:translateY(1px);box-shadow:inset 0 1px 2px rgba(0,0,0,.25);}
.btn-primary{width:100%;padding:13px;border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:700;
  background:linear-gradient(180deg, color-mix(in srgb, var(--blue) 100%, white 15%), var(--blue));
  box-shadow:0 3px 0 var(--btn-lo), inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .08s, box-shadow .08s;}
.btn-primary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--btn-lo), inset 0 1px 0 rgba(255,255,255,.3);}
.btn-secondary{width:100%;padding:13px;border:1px solid var(--border);border-radius:11px;background:var(--surface);
  color:var(--text);font-size:15px;font-weight:600;
  box-shadow:0 3px 0 var(--btn-lo), inset 0 1px 0 var(--btn-hi);
  transition:transform .08s, box-shadow .08s;}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--btn-lo);}
.btn-primary:disabled{opacity:.5;}
.search-list{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;margin-top:8px;}
.search-item{padding:10px 12px;border-top:1px solid var(--grid);font-size:14px;}
.search-item:first-child{border-top:none;}
.search-item .n{font-weight:600;}
.search-item .m{font-size:11.5px;color:var(--muted);}

/* ---- modal ---- */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal-backdrop.center{align-items:center;padding:16px;}
.modal{background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:22px 20px 26px;
  max-height:88vh;overflow-y:auto;}
.modal-backdrop.center .modal{border-radius:18px;max-height:85vh;}
.modal h2{font-size:19px;margin-bottom:4px;}
.modal .sub{font-size:13px;color:var(--muted);margin-bottom:18px;}

/* ---- bottom nav ---- */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:20;}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 10px;
  border:none;background:none;color:var(--muted);font-size:10.5px;font-weight:600;transition:transform .08s;}
.navbtn svg{width:21px;height:21px;transition:transform .12s;}
.navbtn.active{color:var(--blue);}
.navbtn.active svg{transform:translateY(-2px);filter:drop-shadow(0 2px 0 var(--btn-lo));}
.navbtn:active{transform:scale(.92);}

/* ---- week strip ---- */
.weekstrip{display:flex;gap:6px;margin-bottom:14px;}
.daychip{flex:1;text-align:center;padding:8px 2px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border);}
.daychip .d{font-size:10px;color:var(--muted);}
.daychip .v{font-size:13px;font-weight:700;margin-top:3px;}
.daychip.today{border-color:var(--blue);}
.daychip.future{opacity:.35;}

/* ---- chart tooltip ---- */
#chart-tooltip{position:fixed;z-index:60;background:var(--text);color:var(--page);font-size:12px;font-weight:600;
  padding:6px 10px;border-radius:8px;pointer-events:none;transform:translate(-50%,-120%);white-space:nowrap;
  box-shadow:0 4px 10px rgba(0,0,0,.25);}
.chart-mark{cursor:pointer;}

/* ---- dashboard toggle rows (Settings) ---- */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--grid);}
.toggle-row:first-child{border-top:none;}
.toggle-row span{font-size:14px;font-weight:600;}
.switch{width:42px;height:25px;border-radius:99px;border:none;background:var(--grid);position:relative;flex:none;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.15);transition:background .15s;}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.35);transition:transform .15s;}
.switch.on{background:var(--blue);}
.switch.on::after{transform:translateX(17px);}

/* ---- progress rows (totals infographic) ---- */
.prog-row{margin-bottom:11px;}
.prog-row:last-child{margin-bottom:0;}
.prog-top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;}
.prog-top .l{color:var(--text2);font-weight:600;}
.prog-top .v{font-weight:700;}
.prog-track{height:8px;border-radius:99px;background:var(--grid);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.12);}
.prog-fill{height:100%;border-radius:99px;transition:width .3s;}

/* ---- stat pair (projection) ---- */
.stat-pair{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
.stat-pair .big{font-size:32px;font-weight:800;}
.stat-pair .of{font-size:13px;color:var(--muted);}

/* ---- score trio (Total/Activity/Nutrition circles, one infographic) ---- */
.score-trio{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;}
.score-circle-col{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.score-circle-col .cap{font-size:12px;color:var(--muted);text-align:center;line-height:1.4;}

/* ---- collapsible section header ---- */
.section-toggle{display:flex;align-items:center;gap:6px;flex:1;cursor:pointer;}
.section-toggle h3{margin-bottom:0;}
.chevron{width:16px;height:16px;color:var(--muted);flex:none;transition:transform .15s;}
.chevron.open{transform:rotate(180deg);}
.quick-add{width:26px;height:26px;border-radius:50%;border:none;background:var(--good);color:#fff;
  font-size:17px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;flex:none;
  margin-right:8px;box-shadow:0 2px 0 var(--btn-lo), inset 0 1px 0 rgba(255,255,255,.4);}
.quick-add:active{transform:translateY(1px);box-shadow:none;}
.quick-add.red{background:var(--critical);}

/* ---- quick-log pill row (always visible, no tap-to-discover) ---- */
.pill-row{display:flex;gap:10px;margin-bottom:14px;}
.pill-btn{border:none;border-radius:11px;color:#fff;font-weight:700;font-size:14.5px;padding:13px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 3px 0 var(--btn-lo), inset 0 1px 0 rgba(255,255,255,.4);transition:transform .08s, box-shadow .08s;}
.pill-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--btn-lo), inset 0 1px 0 rgba(255,255,255,.3);}
.pill-btn.green{background:linear-gradient(180deg, color-mix(in srgb, var(--good) 100%, white 15%), var(--good));flex:1.5;}
.pill-btn.red{background:linear-gradient(180deg, color-mix(in srgb, var(--critical) 100%, white 15%), var(--critical));flex:1;}

/* ---- popup stat rows (large readable numbers, no chart) ---- */
.popup-stat{padding:12px 0;border-top:1px solid var(--grid);}
.popup-stat:first-child{border-top:none;}
.popup-stat .v{font-size:28px;font-weight:800;line-height:1.15;}
.popup-stat .l{font-size:13px;color:var(--text2);margin-top:2px;}
</style>
</head>
<body>

<div id="app"></div>
<div id="chart-tooltip" class="hidden"></div>

<div class="bottomnav" id="bottomnav">
  <button class="navbtn" data-tab="today"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>Today</button>
  <button class="navbtn" data-tab="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5M12 7v5l4 2"/></svg>History</button>
  <button class="navbtn" data-tab="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>Settings</button>
</div>

<script>
'use strict';

/* =========================================================
   STATE
   ========================================================= */
const STORE_KEY = 'healthscore_v1';

function defaultState(){
  return {
    profile: null, // {age, sex, heightIn, weightLb, goalType, ratePerWeekLb, stepGoal, activeMinGoal}
    days: {},      // 'YYYY-MM-DD' -> {weightLb, foods:[...], activity:{steps,activeMin,kcal,source}}
    myFoods: [],
    foodMemory: {}, // { foodName: {qty, unitLabel} } — last quantity used, recalled next time
    settings: {
      clientId:'', clientSecret:'', useMetric:false,
      charts: { projection:true, trend:true }
    },
    googleHealth: { accessToken:null, refreshToken:null, expiresAt:0 },
    errorLog: [] // [{ts, message}] — last few sync errors, newest first, so silent auto-sync failures are still visible
  };
}

let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    merged.settings = Object.assign(defaultState().settings, parsed.settings);
    merged.settings.charts = Object.assign(defaultState().settings.charts, parsed.settings && parsed.settings.charts);
    return merged;
  }catch(e){ return defaultState(); }
}
let saveWarnedOnce = false;
function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
  }catch(e){
    // Don't call logError() here — it calls saveState() itself, which would recurse
    // if storage is genuinely broken. Record in-memory only and surface it once.
    console.error('Save failed:', e);
    state.errorLog.unshift({ts:Date.now(), message:'Save failed: '+e.message+' — your data may not be persisting.'});
    state.errorLog = state.errorLog.slice(0,3);
    if(!saveWarnedOnce){
      saveWarnedOnce = true;
      alert('Could not save your data (storage error: '+e.message+'). If this is a private/incognito browser tab, switch to a normal tab — private tabs often block or wipe local storage.');
    }
  }
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function logError(message){
  state.errorLog.unshift({ts: Date.now(), message});
  state.errorLog = state.errorLog.slice(0, 3);
  saveState();
}
// Shared by the onboarding "Restore from backup" button and Settings' Import —
// both need the exact same parse/validate/replace logic.
async function importDataFromFile(file){
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!parsed || typeof parsed!=='object' || !('days' in parsed)) throw new Error('This file does not look like a Health Score export.');
    if(!confirm('This will replace all current data on this device with the contents of the imported file. Continue?')) return;
    state = Object.assign(defaultState(), parsed);
    state.settings = Object.assign(defaultState().settings, parsed.settings);
    state.settings.charts = Object.assign(defaultState().settings.charts, parsed.settings && parsed.settings.charts);
    saveState();
    document.querySelectorAll('.modal-backdrop').forEach(m=>m.remove()); // close onboarding if open
    alert('Data imported.');
    render();
  }catch(e){
    alert('Could not import that file: '+e.message);
  }
}

function isoDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function today(){ return isoDate(new Date()); }
function dateFromIso(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(iso, n){ const d=dateFromIso(iso); d.setDate(d.getDate()+n); return isoDate(d); }
function dayOfWeek(iso){ return dateFromIso(iso).getDay(); } // 0=Sun
function isSunday(iso){ return dayOfWeek(iso)===0; }

// Week runs Monday..Sunday. Returns {start, end} iso strings for the week containing iso.
function weekRange(iso){
  const dow = dayOfWeek(iso); // 0=Sun..6=Sat
  const mondayOffset = dow===0 ? -6 : 1-dow;
  const start = addDays(iso, mondayOffset);
  const end = addDays(start, 6);
  return {start, end};
}
function monthRange(iso){
  const d = dateFromIso(iso);
  const start = isoDate(new Date(d.getFullYear(), d.getMonth(), 1));
  const end = isoDate(new Date(d.getFullYear(), d.getMonth()+1, 0));
  return {start, end};
}
function datesBetween(startIso, endIso){
  const out=[]; let cur=startIso;
  while(cur<=endIso){ out.push(cur); cur=addDays(cur,1); }
  return out;
}
function getDay(iso){
  if(!state.days[iso]) state.days[iso] = {weightLb:null, foods:[], activity:{steps:0,activeMin:0,kcal:0,distanceMi:0,source:'manual'}};
  if(state.days[iso].activity.distanceMi===undefined) state.days[iso].activity.distanceMi = 0; // upgrade older saved days
  return state.days[iso];
}

/* =========================================================
   FOOD DATABASE  (per=amount the macros describe; unit 'g'/'ml'/'ea')
   ========================================================= */
const FOOD_DB = [
{n:"Chicken breast, cooked",per:100,u:"g",k:165,p:31,c:0,f:3.6},
{n:"Chicken thigh, cooked",per:100,u:"g",k:209,p:26,c:0,f:10.9},
{n:"Ground beef 85/15, cooked",per:100,u:"g",k:215,p:26,c:0,f:12},
{n:"Ground turkey 93/7, cooked",per:100,u:"g",k:176,p:27,c:0,f:7},
{n:"Salmon, cooked",per:100,u:"g",k:206,p:22,c:0,f:12},
{n:"Tuna, canned in water",per:100,u:"g",k:116,p:26,c:0,f:1},
{n:"Shrimp, cooked",per:100,u:"g",k:99,p:24,c:0.2,f:0.3},
{n:"Bacon",per:1,u:"slice",k:43,p:3,c:0.1,f:3.3},

/* =========================================================
   CALCULATIONS: targets & scores
   ========================================================= */
function lbToKg(lb){ return lb*0.453592; }
function inToCm(inch){ return inch*2.54; }

// Mifflin-St Jeor BMR
function bmr(p){
  const kg = lbToKg(p.weightLb), cm = inToCm(p.heightIn);
  const base = 10*kg + 6.25*cm - 5*p.age;
  return p.sex==='male' ? base+5 : base-161;
}
// Rough calorie burn estimate for manually-entered activity (used when no synced kcal is available)
function estimateActivityKcal(steps, activeMin){
  return Math.round(steps*0.04 + activeMin*4);
}
function weeklyGoalKcalAdjustment(p){
  const sign = p.goalType==='lose' ? -1 : p.goalType==='gain' ? 1 : 0;
  return sign * (p.ratePerWeekLb*3500/7);
}
function dailyTargets(p, activityKcal){
  const rest = bmr(p)*1.2; // sedentary base; tracked exercise added on top
  const kcal = Math.round(rest + (activityKcal||0) + weeklyGoalKcalAdjustment(p));
  const proteinG = Math.round(lbToKg(p.weightLb)*1.6);
  const proteinKcal = proteinG*4;
  const remaining = Math.max(kcal-proteinKcal, 200);
  const fatG = Math.round(remaining*0.35/9);
  const carbG = Math.round(remaining*0.65/4);
  return {kcal, proteinG, carbG, fatG};
}
function dayTotals(iso){
  const d = getDay(iso);
  const t = d.foods.reduce((a,f)=>({kcal:a.kcal+f.kcal,protein:a.protein+f.protein,carbs:a.carbs+f.carbs,fat:a.fat+f.fat}),
    {kcal:0,protein:0,carbs:0,fat:0});
  return t;
}
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function nutritionScore(iso){
  const p = state.profile; if(!p) return null;
  const d = getDay(iso);
  if(d.foods.length===0) return null;
  const totals = dayTotals(iso);
  const targets = dailyTargets(p, d.activity.kcal);
  const calScore = clamp(100 - Math.abs(totals.kcal-targets.kcal)/targets.kcal*200, 0, 100);
  const proScore = clamp(100 - Math.abs(totals.protein-targets.proteinG)/targets.proteinG*100, 0, 100);
  return Math.round(calScore*0.6 + proScore*0.4);
}
function activityScore(iso){
  const p = state.profile; if(!p) return null;
  const d = getDay(iso);
  if(d.activity.steps===0 && d.activity.activeMin===0) return null;
  const stepPart = clamp(d.activity.steps/p.stepGoal*100, 0, 100);
  const minPart = clamp(d.activity.activeMin/p.activeMinGoal*100, 0, 100);
  return Math.round(stepPart*0.6 + minPart*0.4);
}
function dayOverallScore(iso){
  const n = nutritionScore(iso), a = activityScore(iso);
  if(n===null && a===null) return null;
  if(n===null) return a;
  if(a===null) return n;
  return Math.round(n*0.55 + a*0.45);
}
function avgScore(dates, fn){
  const vals = dates.map(fn).filter(v=>v!==null);
  if(vals.length===0) return null;
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function weightTrendScore(startIso, endIso){
  const p = state.profile; if(!p) return null;
  const dates = datesBetween(startIso, endIso);
  const weighed = dates.map(d=>({d, w:state.days[d]?.weightLb})).filter(x=>x.w);
  if(weighed.length<2) return null;
  const first = weighed[0].w, last = weighed[weighed.length-1].w;
  const actualChange = last-first;
  const targetChange = p.goalType==='lose' ? -p.ratePerWeekLb : p.goalType==='gain' ? p.ratePerWeekLb : 0;
  if(p.goalType==='maintain') return clamp(100-Math.abs(actualChange)*40, 0, 100);
  const diff = Math.abs(actualChange-targetChange);
  return clamp(100 - diff*40, 0, 100);
}

/* =========================================================
   FEEDBACK GENERATION — heavy on positive reinforcement,
   with one concrete, achievable action to try next.
   ========================================================= */
function avgRaw(dates, fn){
  const vals = dates.map(fn).filter(v=>v!==null && v!==undefined);
  if(vals.length===0) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
function buildFeedback(dates, weightScoreOverride){
  const p = state.profile;
  const nAvg = avgScore(dates, nutritionScore);
  const aAvg = avgScore(dates, activityScore);
  const loggedDays = dates.filter(d=>getDay(d).foods.length>0).length;
  const goalDays = dates.filter(d=>{const s=activityScore(d); return s!==null && s>=100;}).length;
  const {start:ws,end:we} = {start:dates[0], end:dates[dates.length-1]};
  const wScore = weightScoreOverride!==undefined ? weightScoreOverride : weightTrendScore(ws,we);

  const avgProtein = avgRaw(dates, d=>getDay(d).foods.length ? dayTotals(d).protein : null);
  const avgSteps = avgRaw(dates, d=>{const a=getDay(d).activity; return (a.steps>0||a.activeMin>0) ? a.steps : null;});
  const avgActiveMin = avgRaw(dates, d=>{const a=getDay(d).activity; return (a.steps>0||a.activeMin>0) ? a.activeMin : null;});
  const targetProteinG = dailyTargets(p, 0).proteinG;

  const metrics = [];
  if(nAvg!==null) metrics.push({key:'nutrition', label:'Nutrition', score:nAvg});
  if(aAvg!==null) metrics.push({key:'activity', label:'Activity', score:aAvg});
  if(wScore!==null) metrics.push({key:'weight', label:'Weigh-in trend', score:wScore});

  // Positives — cast a wide net so a strong week surfaces several wins, and even a
  // rough week still finds real, specific things that went right.
  const positives = [];
  if(loggedDays>=Math.ceil(dates.length*0.6)) positives.push(`You logged food on ${loggedDays} of ${dates.length} days — that consistency is the hardest part, and you nailed it.`);
  if(goalDays>0) positives.push(`You hit your full activity goal on ${goalDays} day${goalDays===1?'':'s'} — great work getting moving.`);
  if(avgSteps!==null && avgSteps>=p.stepGoal*0.85) positives.push(`You averaged ${Math.round(avgSteps).toLocaleString()} steps a day, right in range of your ${p.stepGoal.toLocaleString()} goal.`);
  if(avgProtein!==null && avgProtein>=targetProteinG*0.9) positives.push(`Protein averaged ${Math.round(avgProtein)}g a day — right where you want it for your goal.`);
  if(nAvg!==null && nAvg>=75) positives.push(`Nutrition scored ${nAvg}/100 on average — your calories and macros were well balanced.`);
  if(aAvg!==null && aAvg>=75) positives.push(`Activity scored ${aAvg}/100 on average — steps and active minutes were strong.`);
  if(wScore!==null && wScore>=75) positives.push(`Your weight trend tracked closely with your ${p.goalType} goal of ${p.ratePerWeekLb} lb/week — right on plan.`);
  if(positives.length===0 && metrics.length>0){
    const best = metrics.slice().sort((a,b)=>b.score-a.score)[0];
    positives.push(`${best.label} was your strongest area at ${best.score}/100 — a real bright spot this period.`);
  }
  if(positives.length<2) positives.push(`You showed up and tracked your data — that habit is what compounds into results over time.`);
  if(positives.length<3 && loggedDays>0) positives.push(`Every day you logged gave you real data to work with instead of guessing — that's a win in itself.`);

  // One focus — small, specific, and doable, not a scolding.
  let focus = null;
  if(metrics.length>0){
    const worst = metrics.slice().sort((a,b)=>a.score-b.score)[0];
    let tip;
    if(worst.key==='nutrition'){
      const gap = avgProtein!==null ? Math.round(targetProteinG-avgProtein) : null;
      tip = (gap!==null && gap>3)
        ? `Try adding about ${gap}g more protein a day — one scoop of protein powder, a Greek yogurt, or an extra egg would close most of that gap.`
        : `Try logging meals as you go instead of at day's end — it makes hitting your calorie and protein target a lot easier.`;
    } else if(worst.key==='activity'){
      const gap = avgSteps!==null ? Math.round(p.stepGoal-avgSteps) : null;
      tip = (gap!==null && gap>200)
        ? `You're about ${gap.toLocaleString()} steps a day short of goal — one 15-20 minute walk covers most of that.`
        : `Adding one extra short walk on your lowest-activity day would be an easy win next time.`;
    } else {
      tip = `Weigh in at the same time each Sunday, under similar conditions — that alone makes your trend much easier to trust.`;
    }
    focus = {label:worst.label, score:worst.score, tip};
  }
  return {positives:positives.slice(0,3), focus, nAvg, aAvg, wScore};
}

  const obImportFile = wrap.querySelector('#ob-import-file');
  obImportBtn.addEventListener('click', ()=>obImportFile.click());
  obImportFile.addEventListener('change', ()=>importDataFromFile(obImportFile.files[0]));
}

/* =========================================================
   CHART HELPERS (inline SVG, dataviz-skill conventions)
   ========================================================= */
function svgEl(tag, attrs){
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}
// 7-point line chart, one or two series. series: [{name,color,points:[v...]}]
function trendLineChart(series, labels){
  const W=320,H=120,padL=6,padR=6,padT=14,padB=20;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const allVals = series.flatMap(s=>s.points.filter(v=>v!==null));
  const max = Math.max(100, ...allVals);
  const n = labels.length;
  const svg = svgEl('svg',{viewBox:`0 0 ${W} ${H}`});
  svg.appendChild(svgEl('line',{x1:padL,y1:H-padB,x2:W-padR,y2:H-padB,class:'axis-line'}));
  const stepX = n>1 ? plotW/(n-1) : 0;
  series.forEach(s=>{
    let d = '';
    s.points.forEach((v,i)=>{
      if(v===null) return;
      const x = padL + stepX*i, y = H-padB-(v/max)*plotH;
      d += (d===''?'M':'L')+x+' '+y+' ';
    });
    if(d) svg.appendChild(svgEl('path',{d, fill:'none', stroke:s.color,'stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}));
    s.points.forEach((v,i)=>{
      if(v===null) return;
      const x = padL + stepX*i, y = H-padB-(v/max)*plotH;
      const c = svgEl('circle',{cx:x,cy:y,r:5,fill:s.color,class:'chart-mark'});
      c.addEventListener('click', ev=>{ ev.stopPropagation(); showTooltip(ev.clientX, ev.clientY, `${labels[i]} · ${s.name}: ${v}`); });
      svg.appendChild(c);
    });
  });
  labels.forEach((l,i)=>{
    const x = padL + stepX*i;
    const t = svgEl('text',{x, y:H-6, class:'bar-label','text-anchor':'middle'});
    t.textContent = l;
    svg.appendChild(t);
  });
  return svg;
}
function progRow(label, value, target, unit, color){
  const pct = clamp(target>0 ? (value/target*100) : 0, 0, 100);
  return `<div class="prog-row">
    <div class="prog-top"><span class="l">${label}</span><span class="v">${Math.round(value).toLocaleString()}${unit} <span class="muted">/ ${Math.round(target).toLocaleString()}${unit}</span></span></div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}
function scoreRing(score, size, fixedColor){
  size = size||158;
  const sw = Math.max(6, Math.round(size*0.076));
  const r = size/2-sw, c = size/2;
  const circ = 2*Math.PI*r;
  const val = score===null? 0 : score;
  const color = fixedColor || (val>=80?'var(--good)':val>=60?'var(--yellow)':'var(--critical)');
  return `<svg viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--grid)" stroke-width="${sw}"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-val/100)}"/>
  </svg>`;
}
// One consistent ring style at any size, used for the Total/Activity/Nutrition trio —
// number scales with the circle so the small ones stay legible, not cramped.
// displayText is what's shown; pctForRing (0-100, defaults to displayText when it's
// already a plain number like the Total Score) drives the ring fill + color, so
// Activity/Nutrition can show a real value (steps, calories) with a goal-based fill
// instead of a second abstract score.
function scoreCircle(displayText, size, insideLabel, pctForRing, color){
  const pct = pctForRing===undefined ? displayText : pctForRing;
  const numPx = Math.round(size*0.235), lblPx = Math.max(9, Math.round(size*0.068));
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;">
    ${scoreRing(pct, size, color)}
    <div class="ring-label">
      <div class="num" style="font-size:${numPx}px;">${displayText===null?'--':displayText}</div>
      ${insideLabel?`<div class="lbl" style="font-size:${lblPx}px;">${insideLabel}</div>`:''}
    </div>
  </div>`;
}
// Abbreviates large counts (steps, calories) so they still fit cleanly in a small ring.
function formatCompact(n){
  if(n>=1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
  return String(Math.round(n));
}

  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.tab===activeTab));

  if(activeTab==='today') app.innerHTML = screenToday();

      </div>
      <div class="field">
        <label>Goal</label>
        <div class="seg" id="s-goal">
          <button data-v="lose" class="${p.goalType==='lose'?'active':''}">Lose</button>
          <button data-v="maintain" class="${p.goalType==='maintain'?'active':''}">Maintain</button>
          <button data-v="gain" class="${p.goalType==='gain'?'active':''}">Gain</button>
        </div>
      </div>
      <div class="field"><label>Target rate (lb/week)</label><input type="number" step="0.1" id="s-rate" value="${p.ratePerWeekLb}"></div>
      <div class="field-row">
        <div class="field"><label>Daily step goal</label><input type="number" id="s-steps" value="${p.stepGoal}"></div>
        <div class="field"><label>Active min goal</label><input type="number" id="s-min" value="${p.activeMinGoal}"></div>
      </div>
      <button class="btn-primary" id="s-save">Save profile</button>
    </div>

    <div class="card">
      <h3>Dashboard</h3>
      ${dashToggleRow('projection','Week/month pace')}
      ${dashToggleRow('trend','7-day trend')}
    </div>

    <div class="card">
      <div class="card-head"><h3>Google Health sync</h3>${infoBtnHtml('fitsync')}</div>
      ${state.googleHealth.refreshToken ? `<div class="row" style="margin-bottom:12px;"><span class="badge good">Connected — auto-syncing</span></div>` : ''}
      <div class="field"><label>Google Client ID</label><input type="text" id="s-fit-client" placeholder="xxxx.apps.googleusercontent.com" value="${state.settings.clientId}"></div>
      <div class="field"><label>Google Client Secret</label><input type="text" id="s-fit-secret" placeholder="GOCSPX-..." value="${state.settings.clientSecret}"></div>
      <button class="btn-secondary" id="s-fit-save">Save credentials</button>
      <div style="height:8px"></div>
      <button class="btn-primary" id="s-fit-connect">${state.googleHealth.refreshToken ? 'Reconnect & sync now' : 'Connect & sync today'}</button>
    </div>

    ${state.errorLog.length ? `<div class="card">
      <div class="card-head"><h3>Error log</h3><button class="iconbtn" id="s-clear-errors" title="Clear">✕</button></div>
      ${state.errorLog.map(e=>`<div class="feedback-item"><div class="dot" style="background:var(--critical)"></div><div><span class="muted">${new Date(e.ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span><br><span style="font-family:monospace;font-size:12px;word-break:break-word;">${escapeHtml(e.message)}</span></div></div>`).join('')}
    </div>` : ''}

    <div class="card">
      <div class="card-head"><h3>Data</h3>${infoBtnHtml('databackup')}</div>
      <button class="btn-secondary" id="s-export">Export data (JSON)</button>
      <div style="height:8px"></div>
      <button class="btn-secondary" id="s-import">Import data (JSON)</button>
      <input type="file" id="s-import-file" accept="application/json" class="hidden">
      <div style="height:8px"></div>
      <button class="btn-secondary" id="s-reset" style="color:var(--critical)">Reset all data</button>
    </div>
  </div>`;
}
function dashToggleRow(key, label){
  const on = state.settings.charts[key];
  return `<div class="toggle-row"><span>${label}</span><button class="switch ${on?'on':''}" data-chart-toggle="${key}"></button></div>`;
}

/* =========================================================
   GOOGLE HEALTH API (health.googleapis.com) — the platform Google
   moved Fitbit's data onto; the legacy Fitbit Web API is being
   retired Sept 30, 2026. Standard OAuth2 code flow (access_type=
   offline gets a refresh token) so sync runs silently forever
   once connected — no popups, no repeated consent.
   ========================================================= */
const GH_SCOPES = 'https://www.googleapis.com/auth/googlehealth.activity_and_fitness.readonly '
  + 'https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly';

function ghRedirectUri(){ return location.origin + location.pathname; }

async function startGoogleHealthAuth(){
  const {clientId} = state.settings;
  if(!clientId){ alert('Add your Google Client ID first (see instructions below the button).'); return; }
  const params = new URLSearchParams({
    client_id: clientId, response_type:'code', redirect_uri: ghRedirectUri(),
    scope: GH_SCOPES, access_type:'offline', prompt:'consent', include_granted_scopes:'true'
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}
async function handleGoogleHealthRedirect(){
  const url = new URL(location.href);
  const code = url.searchParams.get('code');
  if(!code) return;
  history.replaceState({}, '', ghRedirectUri()); // strip ?code= before it lingers in the URL/history
  const {clientId, clientSecret} = state.settings;
  if(!clientId || !clientSecret) return;
  try{
    const body = new URLSearchParams({
      client_id: clientId, client_secret: clientSecret, grant_type:'authorization_code',
      code, redirect_uri: ghRedirectUri()
    });
    const res = await fetch('https://oauth2.googleapis.com/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
    });
    if(!res.ok){
      const bodyText = await res.text().catch(()=>'');
      throw new Error(`Token exchange HTTP ${res.status}: ${bodyText.slice(0,300)}`);
    }
    const data = await res.json();
    state.googleHealth = {accessToken:data.access_token, refreshToken:data.refresh_token, expiresAt: Date.now()+data.expires_in*1000};
    saveState();
    await fetchGoogleHealthToday(false);
  }catch(e){
    logError('Connect failed: '+e.message);
    alert('Google Health connection failed:\n\n'+e.message+'\n\nDouble check the Client ID/Secret and that this exact URL is registered as a redirect URI on that OAuth client.');
  }
}
async function ensureGoogleHealthToken(){
  const gh = state.googleHealth;
  if(gh.accessToken && Date.now() < gh.expiresAt-60000) return gh.accessToken;
  if(!gh.refreshToken) return null;
  const body = new URLSearchParams({
    client_id: state.settings.clientId, client_secret: state.settings.clientSecret,
    grant_type:'refresh_token', refresh_token: gh.refreshToken
  });
  const res = await fetch('https://oauth2.googleapis.com/token', {
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body
  });
  if(!res.ok) return null;
  const data = await res.json();
  gh.accessToken = data.access_token; gh.expiresAt = Date.now()+data.expires_in*1000;
  if(data.refresh_token) gh.refreshToken = data.refresh_token; // Google doesn't always reissue one
  saveState();
  return gh.accessToken;
}
function extractNumericField(obj, candidates){
  if(!obj) return null;
  for(const key of candidates){
    if(obj[key]!==undefined && obj[key]!==null){ const n=Number(obj[key]); if(!isNaN(n)) return n; }
  }
  return null;
}
// Finds whichever nested field ends in "Sum" (e.g. steps -> countSum, confirmed
// against Google's own reference CLI source) rather than a single hardcoded
// name per data type — resilient to the exact key not being re-checked for
// every type. Values come back as strings ("9037"), hence the Number() call.
function extractRollupSum(rollupPoint){
  if(!rollupPoint) return null;
  for(const key of Object.keys(rollupPoint)){
    if(key==='civilStartTime'||key==='civilEndTime') continue;
    const obj = rollupPoint[key];
    if(obj && typeof obj==='object'){
      const sumKey = Object.keys(obj).find(k=>k.toLowerCase().endsWith('sum'));
      if(sumKey) return Number(obj[sumKey]);
    }
  }
  return null;
}
// The API's CivilDateTime wraps year/month/day in a "date" key — omitting that
// wrapper (sending {year,month,day} directly as the range bound) is what was
// causing the 400 INVALID_DATA_POINT_FILTER_RESTRICTION_COMPARATOR error.
function civilDate(dateIso){
  const d = dateFromIso(dateIso);
  return {date: {year:d.getFullYear(), month:d.getMonth()+1, day:d.getDate()}};
}
// One aggregated total for the whole day, computed server-side — avoids both
// the civil_start_time filter's comparator restrictions and any risk of
// under-counting from un-paginated raw data points.
async function fetchGoogleHealthRollup(dataType, dateIso, token){
  const url = `https://health.googleapis.com/v4/users/me/dataTypes/${dataType}/dataPoints:dailyRollUp`;
  const body = JSON.stringify({
    range: {start: civilDate(dateIso), end: civilDate(addDays(dateIso,1))},
    windowSizeDays: 1
  });
  const res = await fetch(url, {method:'POST', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body});
  if(!res.ok){
    const bodyText = await res.text().catch(()=>'');
    throw new Error(`HTTP ${res.status} for ${dataType}: ${bodyText.slice(0,300)}`);
  }
  const data = await res.json();
  const points = data.rollupDataPoints || [];
  return points.reduce((sum,p)=>sum + (extractRollupSum(p)||0), 0);
}
async function fetchGoogleHealthDataType(dataType, filterField, dateIso, token){
  // civil_start_time only supports >= and < as comparators (no <=), so the upper
  // bound has to be the start of the next day, not 23:59:59 of this one.
  const start = `${dateIso}T00:00:00`, end = `${addDays(dateIso,1)}T00:00:00`;
  const filter = `${filterField}.interval.civil_start_time >= "${start}" AND ${filterField}.interval.civil_start_time < "${end}"`;
  const url = `https://health.googleapis.com/v4/users/me/dataTypes/${dataType}/dataPoints?filter=${encodeURIComponent(filter)}`;
  const res = await fetch(url, {headers:{'Authorization':'Bearer '+token}});
  if(!res.ok){
    const bodyText = await res.text().catch(()=>'');
    throw new Error(`HTTP ${res.status} for ${dataType}: ${bodyText.slice(0,300)}`);
  }
  const data = await res.json();
  return data.dataPoints || data.dataPoint || [];
}
async function fetchGoogleHealthToday(silent){
  const token = await ensureGoogleHealthToken();
  if(!token){ if(!silent) alert('Not connected to Google Health yet — tap "Connect & sync today" first.'); return; }
  const t = today();
  try{
    const [steps, activeMin, kcal, distanceMm] = await Promise.all([
      fetchGoogleHealthRollup('steps', t, token),
      fetchGoogleHealthRollup('active-zone-minutes', t, token).catch(()=>0),
      fetchGoogleHealthRollup('active-energy-burned', t, token).catch(()=>0),
      fetchGoogleHealthRollup('distance', t, token).catch(()=>0) // returned in millimeters, per Google's field docs
    ]);
    const d = getDay(t);
    d.activity = {
      steps: Math.round(steps), activeMin: Math.round(activeMin), kcal: Math.round(kcal),
      distanceMi: Math.round((distanceMm/1609340)*10)/10, source:'googlehealth'
    };

    try{
      const weightPoints = await fetchGoogleHealthDataType('weight', 'weight', t, token);
      if(weightPoints.length && !d.weightLb){
        const last = weightPoints[weightPoints.length-1];
        // Google's field is weightGrams — grams, not kilograms.
        const grams = extractNumericField(last.weight||last, ['weightGrams','massGrams','grams','value']);
        if(grams) d.weightLb = Math.round((grams/453.592)*10)/10;
      }
    }catch(e){ /* weight scope/data may not be available yet — activity sync still succeeds */ }

    saveState(); render();
    if(!silent) alert(`Synced from Google Health: ${Math.round(steps)} steps, ${Math.round(activeMin)} active min.`);
  }catch(e){
    console.error('Google Health sync failed:', e);
    logError('Sync failed: '+e.message);
    if(!silent) alert('Could not fetch Google Health data:\n\n'+e.message+'\n\nManual entry on the Log tab still works.');
  }
}
let lastGHAutoSync = 0;
// Deliberately short — this is called from render(), which fires after essentially every
// app action (tab switch, food add/remove, activity edit, keystroke in search), so the app
// feels continuously live rather than needing a manual "refresh" tap. The floor only exists
// to stop rapid-fire renders (e.g. fast typing) from hammering the API.
const GH_AUTOSYNC_GAP_MS = 8*1000;
async function autoSyncGoogleHealthIfDue(){
  if(!state.googleHealth.refreshToken) return;
  if(Date.now()-lastGHAutoSync < GH_AUTOSYNC_GAP_MS) return;
  lastGHAutoSync = Date.now();
  await fetchGoogleHealthToday(true);
}

/* =========================================================
   EVENT WIRING
   ========================================================= */
function mountCharts(){
  // Steps/Active-min/Distance/Calories/Protein no longer render as charts anywhere —
  // openActivityModal/openNutritionModal show large readable numbers instead.
  // This only needs to handle History's trend chart.
  const t = today();
  const trendEl = document.getElementById('chart-trend');
  if(trendEl){
    const dates = []; for(let i=6;i>=0;i--) dates.push(addDays(t,-i));
    const labels = dates.map(d=>dateFromIso(d).toLocaleDateString(undefined,{weekday:'short'}).slice(0,2));
    trendEl.appendChild(trendLineChart([
      {name:'Activity', color:'var(--blue)', points: dates.map(activityScore)},
      {name:'Nutrition', color:'var(--aqua)', points: dates.map(nutritionScore)}
    ], labels));
  }
}

function attachHandlers(){
  document.querySelectorAll('.navbtn').forEach(b=>b.addEventListener('click', ()=>{ activeTab=b.dataset.tab; render(); }));
  document.querySelectorAll('[data-quick-nav]').forEach(b=>b.addEventListener('click', e=>{
    e.stopPropagation(); activeTab=b.dataset.quickNav; logFocus=b.dataset.logFocus||null; render();
  }));
  document.querySelectorAll('[data-open-modal]').forEach(el=>el.addEventListener('click', ()=>{
    const which = el.dataset.openModal;
    if(which==='totals') openTotalsModal();
    else if(which==='activity') openActivityModal();
    else if(which==='nutrition') openNutritionModal();
  }));
  wireInfoButtons(document);
  document.querySelectorAll('[data-chart-toggle]').forEach(b=>b.addEventListener('click', ()=>{
    const key = b.dataset.chartToggle;
    state.settings.charts[key] = !state.settings.charts[key];
    saveState(); render();
  }));

  const dateEl = document.getElementById('today-date');
  if(dateEl) dateEl.textContent = new Date().toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'});

  // LOG tab
  const search = document.getElementById('food-search');
  if(search){
    search.addEventListener('input', e=>{
      logFoodQuery = e.target.value;
      render();
      // Re-rendering replaces the input with a fresh DOM node, which resets the
      // cursor to the start unless we explicitly put it back at the end.
      const el = document.getElementById('food-search');
      el.focus();
      el.setSelectionRange(el.value.length, el.value.length);
    });
  }
  const resultsEl = document.getElementById('food-results');
  if(resultsEl){
    const {list:results} = getFoodResults();
    resultsEl.querySelectorAll('.search-item').forEach(el=>{
      el.addEventListener('click', ()=>{ pendingFood = results[Number(el.dataset.idx)]; screenAddQtyModal(pendingFood); });
    });
  }
  const sortBtn = document.getElementById('btn-sort-foods');
  if(sortBtn) sortBtn.addEventListener('click', ()=>{ foodSortMode = foodSortMode==='kcal'?'logged':'kcal'; render(); });
  const customBtn = document.getElementById('btn-custom-food');
  if(customBtn) customBtn.addEventListener('click', screenCustomFoodModal);
  document.querySelectorAll('[data-food]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = Number(el.dataset.food);
      const d = getDay(today());
      d.foods = d.foods.filter(f=>f.id!==id);
      saveState(); render();
    });
  });
  // Activity fields auto-save on change (fires on blur/Enter) so a typed value is never
  // lost by navigating away before an explicit save — mirrors how food logging already
  // commits immediately. Note: if Google Health is connected, the next reactive resync
  // (fires via render() below, same as any other action) will overwrite this with synced
  // data — manual entry is really the fallback for days/metrics Google Health doesn't cover.
  const saveActivityFromInputs = ()=>{
    const d = getDay(today());
    const steps = Number(document.getElementById('act-steps').value)||0;
    const min = Number(document.getElementById('act-min').value)||0;
    const dist = Number(document.getElementById('act-dist').value)||0;
    d.activity = {steps, activeMin:min, distanceMi:dist, kcal: estimateActivityKcal(steps,min), source:'manual'};
    saveState(); render();
  };
  ['act-steps','act-min','act-dist'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('change', saveActivityFromInputs);
  });
  const connectFit = document.getElementById('btn-connect-fit');
  if(connectFit) connectFit.addEventListener('click', ()=>{
    state.googleHealth.refreshToken ? fetchGoogleHealthToday(false) : startGoogleHealthAuth();
  });

  // HISTORY tab
  const histSeg = document.getElementById('history-seg');
  if(histSeg) histSeg.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ historyMode=b.dataset.v; render(); }));

  // SETTINGS tab
  const sGoal = document.getElementById('s-goal');
  if(sGoal) sGoal.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{
    sGoal.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
  }));
  const sSave = document.getElementById('s-save');
  if(sSave) sSave.addEventListener('click', ()=>{
    const goalType = sGoal.querySelector('.active').dataset.v;
    state.profile = {
      age: Number(document.getElementById('s-age').value),
      sex: document.getElementById('s-sex').value,
      heightIn: Number(document.getElementById('s-height').value),
      weightLb: Number(document.getElementById('s-weight').value),
      goalType,
      ratePerWeekLb: goalType==='maintain'?0:Number(document.getElementById('s-rate').value)||0,
      stepGoal: Number(document.getElementById('s-steps').value)||8000,
      activeMinGoal: Number(document.getElementById('s-min').value)||30
    };
    saveState(); alert('Profile saved.'); render();
  });
  const fitSave = document.getElementById('s-fit-save');
  if(fitSave) fitSave.addEventListener('click', ()=>{
    state.settings.clientId = document.getElementById('s-fit-client').value.trim();
    state.settings.clientSecret = document.getElementById('s-fit-secret').value.trim();
    saveState(); alert('Credentials saved.');
  });
  const fitConnect = document.getElementById('s-fit-connect');
  if(fitConnect) fitConnect.addEventListener('click', startGoogleHealthAuth);
  const exportBtn = document.getElementById('s-export');
  if(exportBtn) exportBtn.addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'health-score-data.json'; a.click();
  });
  const importBtn = document.getElementById('s-import');
  const importFile = document.getElementById('s-import-file');
  if(importBtn && importFile) importBtn.addEventListener('click', ()=>importFile.click());
  if(importFile) importFile.addEventListener('change', ()=>importDataFromFile(importFile.files[0]));
  const clearErrorsBtn = document.getElementById('s-clear-errors');
  if(clearErrorsBtn) clearErrorsBtn.addEventListener('click', ()=>{ state.errorLog = []; saveState(); render(); });
  const resetBtn = document.getElementById('s-reset');
  if(resetBtn) resetBtn.addEventListener('click', ()=>{
    if(confirm('This will erase all Health Score data on this device. Continue?')){
      localStorage.removeItem(STORE_KEY); state = defaultState(); render();
    }
  });
}

render();
handleGoogleHealthRedirect();
// Best-effort: asks the browser not to auto-evict this site's storage under
// low-disk pressure. Does NOT protect against the user explicitly clearing
// history/site data — no web API can opt out of that.
if(navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(()=>{});
</script>
